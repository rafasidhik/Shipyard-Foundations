<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Project | Scalable Web App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
        }
        h1 { margin-bottom: 0.5rem; font-weight: 800; letter-spacing: -1px; }
        .description { font-size: 1.1rem; opacity: 0.7; margin-bottom: 2rem; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            text-align: left;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        .stat-label { display: block; opacity: 0.5; font-size: 0.7rem; text-transform: uppercase; }
        .stat-value { color: #38bdf8; font-weight: bold; }

        .status-badge {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* Style for the last div */
        .footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Mission Accomplished</h1>
        <p class="description">My first Scalable Web App</p>
        
        <div class="grid">
            <div class="stat-box">
                <span class="stat-label">Runtime</span>
                <span class="stat-value">Nginx:Alpine</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Orchestrator</span>
                <span class="stat-value">Kubernetes</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Replica Target</span>
                <span class="stat-value">03 Pods</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Cluster Type</span>
                <span class="stat-value">KIND Local</span>
            </div>
        </div>

        <div class="status-badge">● SYSTEM STABLE</div>
        <div class="footer">
            Shipyard Bootcamp Final Project
        </div>
    </div>
</body>
</html>
